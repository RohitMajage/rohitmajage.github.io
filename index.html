    <script>
        // ✅ Your JavaScript stays unchanged (theme toggle, PDF modal, etc.)
        document.getElementById('year').textContent = new Date().getFullYear();

        (function () {
            var storageKey = 'preferred-theme';
            var root = document.documentElement;
            function applyTheme(theme) {
                if (theme === 'light') {
                    root.setAttribute('data-theme', 'light');
                } else {
                    root.removeAttribute('data-theme');
                }
            }
            var saved = localStorage.getItem(storageKey);
            if (saved) {
                applyTheme(saved);
            } else {
                var prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
                applyTheme(prefersLight ? 'light' : 'dark');
            }
            var btn = document.getElementById('themeToggle');
            if (btn) {
                btn.addEventListener('click', function () {
                    var isLight = root.getAttribute('data-theme') === 'light';
                    var next = isLight ? 'dark' : 'light';
                    applyTheme(next);
                    localStorage.setItem(storageKey, next);
                });
            }
        })();

        // Certificates modal logic (opens PDF in popup)
        (function () {
            function ensureModal() {
                var existing = document.getElementById('pdfModal');
                if (existing) return existing;
                var overlay = document.createElement('div');
                overlay.id = 'pdfModal';
                overlay.className = 'modal-overlay hidden';
                overlay.innerHTML = '\n<div class="modal-dialog" role="dialog" aria-modal="true">\n  <div class="modal-header">\n    <span class="modal-title">Certificate</span>\n    <button type="button" class="btn btn-ghost modal-close" aria-label="Close">✕</button>\n  </div>\n  <div class="modal-body">\n    <iframe id="pdfFrame" title="Certificate PDF" loading="lazy"></iframe>\n  </div>\n</div>';
                document.body.appendChild(overlay);
                return overlay;
            }

            var overlay = ensureModal();
            var pdfFrame = function(){ return document.getElementById('pdfFrame'); };
            function openModal(url) {
                overlay.classList.remove('hidden');
                pdfFrame().src = url;
                document.body.style.overflow = 'hidden';
            }
            function closeModal() {
                overlay.classList.add('hidden');
                pdfFrame().src = '';
                document.body.style.overflow = '';
            }

            document.addEventListener('click', function (e) {
                var link = e.target.closest('[data-pdf]');
                if (link) {
                    e.preventDefault();
                    var url = link.getAttribute('data-pdf');
                    if (url) openModal(url);
                }
                if (e.target.closest('.modal-close')) {
                    e.preventDefault();
                    closeModal();
                }
                if (e.target === overlay) {
                    closeModal();
                }
            });
            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape') closeModal();
            });
        })();

        // Download Portfolio as PDF
        document.getElementById('downloadPDF').addEventListener('click', function() {
            var printStyles = document.createElement('style');
            printStyles.textContent = `
                @media print {
                    body { background: white !important; color: black !important; }
                    .site-header, .site-footer { background: white !important; border: 1px solid #ccc !important; }
                    .card { background: white !important; border: 1px solid #ddd !important; box-shadow: none !important; }
                    .btn, .pdf-badge, .credit-badge { display: none !important; }
                    .hero-photo { width: 120px !important; height: 120px !important; }
                    .modal-overlay { display: none !important; }
                    .cert-link-title { color: black !important; }
                    .badge { background: #f0f0f0 !important; color: black !important; border: 1px solid #ccc !important; }
                }
            `;
            document.head.appendChild(printStyles);
            window.print();
            setTimeout(function() {
                document.head.removeChild(printStyles);
            }, 1000);
        });
    </script>
